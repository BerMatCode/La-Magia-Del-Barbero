<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Panel Admin | La Magia Del Barbero</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
:root {
  --bg: #050505;
  --bg-card: #0f0f0f;
  --bg-card-hover: #161616;
  --bg-input: #0a0a0a;
  --gold: #D4AF37;
  --gold-light: #FFD700;
  --gold-soft: rgba(212, 175, 55, 0.12);
  --gold-glow: rgba(212, 175, 55, 0.4);
  --gold-border: rgba(212, 175, 55, 0.25);
  --white: #ffffff;
  --gray: #999;
  --gray-dark: #333;
  --green: #25D366;
  --green-soft: rgba(37, 211, 102, 0.12);
  --orange: #FF8C00;
  --orange-soft: rgba(255, 140, 0, 0.12);
  --red: #ff4757;
  --red-soft: rgba(255, 71, 87, 0.12);
  --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Patrick Hand', cursive;
  background: var(--bg);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
  font-size: 18px;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse at 30% 0%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 100%, rgba(212, 175, 55, 0.06) 0%, transparent 50%);
  pointer-events: none;
  z-index: -1;
}

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold-light); }

/* === LOGIN === */
.login-overlay {
  position: fixed;
  inset: 0;
  background: rgba(5, 5, 5, 0.97);
  backdrop-filter: blur(20px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: var(--transition);
}
.login-overlay.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
.login-box {
  background: var(--bg-card);
  border: 2px solid var(--gold);
  border-radius: 25px;
  padding: 50px 45px;
  max-width: 430px;
  width: 90%;
  text-align: center;
  box-shadow: 0 0 80px var(--gold-glow);
  animation: loginPop 0.5s ease;
}
@keyframes loginPop {
  from { opacity: 0; transform: scale(0.85) translateY(30px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.login-icon {
  width: 70px;
  height: 70px;
  background: var(--gold-soft);
  border: 2px solid var(--gold);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 22px;
  font-size: 1.8rem;
  color: var(--gold-light);
  text-shadow: 0 0 20px var(--gold-glow);
}
.login-box h2 {
  font-family: 'Patrick Hand', cursive;
  font-size: 2rem;
  color: var(--gold-light);
  margin-bottom: 8px;
  text-shadow: 0 0 20px var(--gold-glow);
}
.login-box p {
  color: var(--gray);
  font-size: 1rem;
  margin-bottom: 30px;
}
.login-input-wrap {
  position: relative;
  margin-bottom: 25px;
}
.login-input-wrap i {
  position: absolute;
  left: 18px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gold);
  font-size: 1.2rem;
}
.login-input {
  width: 100%;
  padding: 15px 18px 15px 50px;
  background: var(--bg-input);
  border: 2px solid var(--gold-border);
  border-radius: 14px;
  color: var(--white);
  font-family: 'Patrick Hand', cursive;
  font-size: 1.2rem;
  text-align: center;
  letter-spacing: 4px;
  transition: var(--transition);
}
.login-input:focus {
  outline: none;
  border-color: var(--gold-light);
  box-shadow: 0 0 30px var(--gold-glow);
}
.login-input.error {
  border-color: var(--red);
  box-shadow: 0 0 25px rgba(255, 71, 87, 0.3);
  animation: shake 0.4s ease;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}
.login-btn {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: var(--bg);
  border: none;
  border-radius: 14px;
  font-family: 'Patrick Hand', cursive;
  font-size: 1.3rem;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition);
  box-shadow: 0 5px 25px var(--gold-glow);
}
.login-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 40px var(--gold-glow);
}
.login-error-msg {
  color: var(--red);
  font-size: 1rem;
  margin-top: 14px;
  display: none;
}
.login-error-msg.show { display: block; animation: shake 0.4s ease; }

/* === HEADER === */
.admin-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(5, 5, 5, 0.95);
  backdrop-filter: blur(25px);
  border-bottom: 1px solid var(--gold-border);
  padding: 20px 20px;
  box-shadow: 0 5px 40px rgba(212, 175, 55, 0.15);
}
.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 15px;
}
.header-title h1 {
  font-family: 'Patrick Hand', cursive;
  font-size: 1.9rem;
  color: var(--gold-light);
  text-shadow: 0 0 20px var(--gold-glow);
  margin-bottom: 2px;
}
.header-title p {
  color: var(--gray);
  font-size: 0.95rem;
}
.header-date {
  display: flex;
  align-items: center;
  gap: 10px;
}
.header-date label {
  color: var(--gold);
  font-size: 1rem;
  white-space: nowrap;
}
.header-date input[type="date"] {
  padding: 11px 16px;
  background: var(--bg-input);
  border: 2px solid var(--gold-border);
  border-radius: 12px;
  color: var(--white);
  font-family: 'Patrick Hand', cursive;
  font-size: 1.05rem;
  transition: var(--transition);
  cursor: pointer;
}
.header-date input[type="date"]:focus {
  outline: none;
  border-color: var(--gold-light);
  box-shadow: 0 0 20px var(--gold-glow);
}
.header-date input[type="date"]::-webkit-calendar-picker-indicator {
  filter: invert(0.8) sepia(1) saturate(5) hue-rotate(10deg);
  cursor: pointer;
}
.btn-today {
  padding: 11px 22px;
  background: transparent;
  border: 2px solid var(--gold);
  border-radius: 12px;
  color: var(--gold-light);
  font-family: 'Patrick Hand', cursive;
  font-size: 1.05rem;
  cursor: pointer;
  transition: var(--transition);
}
.btn-today:hover {
  background: var(--gold);
  color: var(--bg);
  box-shadow: 0 0 20px var(--gold-glow);
}
.auto-refresh-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 7px 16px;
  background: var(--gold-soft);
  border: 1px solid var(--gold-border);
  border-radius: 20px;
  font-size: 0.85rem;
  color: var(--gold-light);
}
.auto-refresh-badge .dot {
  width: 8px;
  height: 8px;
  background: var(--green);
  border-radius: 50%;
  animation: pulseDot 2s infinite;
}
@keyframes pulseDot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* === STATS BAR === */
.stats-bar {
  max-width: 1100px;
  margin: 25px auto 0;
  padding: 0 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--gold-border);
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
}
.stat-card.income::before {
  background: linear-gradient(90deg, var(--green), #2ecc71);
}
.stat-card.pending-stat::before {
  background: linear-gradient(90deg, var(--orange), #ffb347);
}
.stat-card.cancelled-stat::before {
  background: linear-gradient(90deg, var(--red), #ff6b6b);
}
.stat-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 30px rgba(212, 175, 55, 0.15);
}
.stat-icon {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 12px;
  font-size: 1.2rem;
}
.stat-card .stat-icon {
  background: var(--gold-soft);
  color: var(--gold-light);
  border: 1px solid var(--gold-border);
}
.stat-card.income .stat-icon {
  background: var(--green-soft);
  color: var(--green);
  border: 1px solid rgba(37, 211, 102, 0.3);
}
.stat-card.pending-stat .stat-icon {
  background: var(--orange-soft);
  color: var(--orange);
  border: 1px solid rgba(255, 140, 0, 0.3);
}
.stat-card.cancelled-stat .stat-icon {
  background: var(--red-soft);
  color: var(--red);
  border: 1px solid rgba(255, 71, 87, 0.3);
}
.stat-value {
  font-size: 2rem;
  font-weight: 700;
  color: var(--gold-light);
  text-shadow: 0 0 15px var(--gold-glow);
  line-height: 1;
  margin-bottom: 4px;
}
.stat-card.income .stat-value {
  color: var(--green);
  text-shadow: 0 0 15px rgba(37, 211, 102, 0.4);
}
.stat-card.pending-stat .stat-value {
  color: var(--orange);
  text-shadow: 0 0 15px rgba(255, 140, 0, 0.4);
}
.stat-card.cancelled-stat .stat-value {
  color: var(--red);
  text-shadow: 0 0 15px rgba(255, 71, 87, 0.4);
}
.stat-label {
  color: var(--gray);
  font-size: 0.95rem;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* === MAIN CONTENT === */
.main-content {
  max-width: 1100px;
  margin: 0 auto;
  padding: 25px 20px 80px;
}

/* === TARJETAS DE RESERVA === */
.reservations-list {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.reservation-card {
  background: var(--bg-card);
  border: 1px solid var(--gold-border);
  border-radius: 20px;
  padding: 0;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.reservation-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  transition: var(--transition);
}
.reservation-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--gold);
  box-shadow: 0 12px 40px rgba(212, 175, 55, 0.2);
  transform: translateY(-4px);
}

.reservation-card.completed-card::before {
  background: linear-gradient(90deg, var(--green), #2ecc71);
  height: 4px;
  opacity: 1;
}
.reservation-card.cancelled-card::before {
  background: linear-gradient(90deg, var(--red), #ff6b6b);
  height: 4px;
  opacity: 1;
}

/* Card Header */
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 22px;
  border-bottom: 1px solid var(--gold-border);
  flex-wrap: wrap;
  gap: 12px;
}
.card-status {
  padding: 6px 18px;
  border-radius: 25px;
  font-size: 0.9rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  transition: var(--transition);
  border: none;
  font-family: 'Patrick Hand', cursive;
  font-size: 0.95rem;
}
.card-status.pending {
  background: var(--orange-soft);
  border: 2px solid var(--orange);
  color: var(--orange);
}
.card-status.completed {
  background: var(--green-soft);
  border: 2px solid var(--green);
  color: var(--green);
}
.card-status.cancelled {
  background: var(--red-soft);
  border: 2px solid var(--red);
  color: var(--red);
}
.card-status:hover {
  transform: scale(1.08);
  box-shadow: 0 0 20px currentColor;
}

.card-reserved-time {
  color: var(--gray);
  font-size: 0.9rem;
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-reserved-time i { color: var(--gold); }
.card-reserved-time strong {
  color: var(--gold-light);
  text-shadow: 0 0 8px var(--gold-glow);
}

/* Card Body */
.card-body {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 0;
}
.card-item {
  padding: 18px 22px;
  border-right: 1px solid var(--gold-border);
  border-bottom: 1px solid var(--gold-border);
  transition: var(--transition);
}
.card-item:nth-child(3n) { border-right: none; }
.card-item:nth-last-child(-n+3) { border-bottom: none; }
.card-item:hover {
  background: var(--gold-soft);
}

.card-item .item-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.card-item .item-header i {
  color: var(--gold);
  font-size: 1rem;
}
.card-item .item-label {
  color: var(--gray);
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.card-item .item-value {
  color: var(--white);
  font-size: 1.15rem;
  font-weight: 700;
  /* ✨ Subrayado dorado para valores importantes */
  border-bottom: 2px solid var(--gold-border);
  padding-bottom: 3px;
  display: inline-block;
  transition: var(--transition);
}
.card-item:hover .item-value {
  border-bottom-color: var(--gold-light);
  text-shadow: 0 0 10px var(--gold-glow);
}
.card-item .item-value.price-value {
  color: var(--gold-light);
  font-size: 1.4rem;
  text-shadow: 0 0 15px var(--gold-glow);
  border-bottom-color: var(--gold);
}
.card-item .item-value.client-name {
  color: var(--gold-light);
  font-size: 1.2rem;
}
.card-item .item-value.cita-time {
  color: var(--gold-light);
  font-size: 1.3rem;
  text-shadow: 0 0 12px var(--gold-glow);
  border-bottom-color: var(--gold);
}

/* === SIN RESERVAS === */
.no-reservations {
  text-align: center;
  padding: 70px 20px;
  color: var(--gray);
}
.no-reservations i {
  font-size: 3.5rem;
  color: var(--gold);
  margin-bottom: 20px;
  opacity: 0.4;
}
.no-reservations h3 {
  font-family: 'Patrick Hand', cursive;
  font-size: 1.6rem;
  color: var(--gold-light);
  margin-bottom: 8px;
}
.no-reservations p {
  font-size: 1rem;
}

/* === LOADING === */
.loading-spinner {
  text-align: center;
  padding: 50px;
}
.loading-spinner .spinner {
  width: 50px;
  height: 50px;
  border: 3px solid var(--gold-soft);
  border-top-color: var(--gold-light);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 15px;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
.loading-spinner p {
  color: var(--gray);
}

/* === FOOTER === */
.admin-footer {
  text-align: center;
  padding: 30px 20px;
  border-top: 1px solid var(--gold-border);
}
.footer-credit {
  font-family: 'Patrick Hand', cursive;
  font-size: 1.1rem;
  color: var(--gold);
  text-shadow: 0 0 15px var(--gold-glow);
  animation: glowText 2s ease-in-out infinite;
}
@keyframes glowText {
  0%, 100% { text-shadow: 0 0 15px var(--gold-glow), 0 0 30px transparent; }
  50% { text-shadow: 0 0 20px var(--gold-glow), 0 0 50px var(--gold-glow), 0 0 80px var(--gold-glow); }
}

/* === RESPONSIVE === */
@media (max-width: 768px) {
  .header-inner { flex-direction: column; align-items: stretch; text-align: center; }
  .header-date { justify-content: center; flex-wrap: wrap; }
  .header-title { text-align: center; }
  .header-title h1 { font-size: 1.6rem; }
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
  .card-body { grid-template-columns: 1fr 1fr; }
  .card-item { border-right: none !important; border-bottom: 1px solid var(--gold-border) !important; }
  .card-item:nth-last-child(-n+2) { border-bottom: none !important; }
  .reservation-card { padding: 0; }
  .card-header { padding: 14px 18px; }
  .card-item { padding: 14px 18px; }
  .admin-footer { padding: 25px 15px; }
}
@media (max-width: 480px) {
  .stats-bar { grid-template-columns: 1fr; }
  .card-body { grid-template-columns: 1fr; }
  .card-item { border-bottom: 1px solid var(--gold-border) !important; }
  .card-item:last-child { border-bottom: none !important; }
}
</style>
</head>
<body>

<!-- === LOGIN === -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-icon">
      <i class="fas fa-lock"></i>
    </div>
    <h2>Acceso Admin</h2>
    <p>Ingresa la contraseña para continuar</p>
    <div class="login-input-wrap">
      <i class="fas fa-key"></i>
      <input type="password" class="login-input" id="passwordInput" placeholder="••••••••" maxlength="20" autofocus>
    </div>
    <button class="login-btn" id="loginBtn" onclick="checkPassword()">
      <i class="fas fa-sign-in-alt"></i> Entrar
    </button>
    <p class="login-error-msg" id="loginError">❌ Contraseña incorrecta</p>
  </div>
</div>

<!-- === PANEL ADMIN === -->
<div id="adminPanel" style="display: none;">

  <header class="admin-header">
    <div class="header-inner">
      <div class="header-title">
        <h1>📋 Panel de Reservas</h1>
        <p>La Magia Del Barbero</p>
      </div>
      <div class="header-date">
        <label><i class="fas fa-calendar-alt"></i> Fecha:</label>
        <input type="date" id="dateFilter">
        <button class="btn-today" onclick="goToday()">Hoy</button>
      </div>
      <div class="auto-refresh-badge">
        <span class="dot"></span>
        Auto-actualiza cada 2 min
      </div>
    </div>
  </header>

  <!-- === STATS BAR === -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-users"></i></div>
      <div class="stat-value" id="statClients">0</div>
      <div class="stat-label">Clientes Atendidos</div>
    </div>
    <div class="stat-card income">
      <div class="stat-icon"><i class="fas fa-sack-dollar"></i></div>
      <div class="stat-value" id="statIncome">S/ 0</div>
      <div class="stat-label">Ingresos del Día</div>
    </div>
    <div class="stat-card pending-stat">
      <div class="stat-icon"><i class="fas fa-hourglass-half"></i></div>
      <div class="stat-value" id="statPending">0</div>
      <div class="stat-label">Pendientes</div>
    </div>
    <div class="stat-card cancelled-stat">
      <div class="stat-icon"><i class="fas fa-ban"></i></div>
      <div class="stat-value" id="statCancelled">0</div>
      <div class="stat-label">Cancelados</div>
    </div>
  </div>

  <!-- === MAIN CONTENT === -->
  <main class="main-content">
    <div id="loadingArea" class="loading-spinner">
      <div class="spinner"></div>
      <p>Cargando reservas...</p>
    </div>
    <div class="reservations-list" id="reservationsList"></div>
  </main>

  <footer class="admin-footer">
    <p class="footer-credit">✨ BerMatCode ✨</p>
  </footer>

</div>

<script>
  // === FIREBASE ===
  const firebaseConfig = {
    apiKey: "AIzaSyCfpqyhfHJIrxHIukoHm_G3r_DFIKAQgnU",
    authDomain: "la-magia-del-barbero1.firebaseapp.com",
    projectId: "la-magia-del-barbero1",
    storageBucket: "la-magia-del-barbero1.firebasestorage.app",
    messagingSenderId: "654157704810",
    appId: "1:654157704810:web:f0573a1dcb3b7dd5e02413",
    measurementId: "G-ZNXJLD03JY"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const reservationsRef = db.collection('reservations');

  // === LOGIN ===
  const PASSWORD = "BerMatCode";
  const loginOverlay = document.getElementById('loginOverlay');
  const adminPanel = document.getElementById('adminPanel');
  const passwordInput = document.getElementById('passwordInput');
  const loginError = document.getElementById('loginError');

  if (sessionStorage.getItem('adminAuth') === 'true') {
    loginOverlay.classList.add('hidden');
    adminPanel.style.display = 'block';
    initAdmin();
  }

  passwordInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPassword();
  });

  function checkPassword() {
    if (passwordInput.value === PASSWORD) {
      sessionStorage.setItem('adminAuth', 'true');
      loginOverlay.classList.add('hidden');
      adminPanel.style.display = 'block';
      setTimeout(() => { initAdmin(); }, 300);
    } else {
      passwordInput.classList.add('error');
      loginError.classList.add('show');
      passwordInput.value = '';
      passwordInput.focus();
      setTimeout(() => {
        passwordInput.classList.remove('error');
        loginError.classList.remove('show');
      }, 2500);
    }
  }

  // === ADMIN ===
  let unsubscribe = null;
  let refreshInterval = null;
  let currentDate = '';

  function initAdmin() {
    const today = new Date().toISOString().split('T')[0];
    const dateFilter = document.getElementById('dateFilter');
    dateFilter.value = today;
    dateFilter.addEventListener('change', function() {
      loadReservations(this.value);
    });
    currentDate = today;
    loadReservations(today);

    // ✅ Auto-refresh cada 2 minutos (120,000 ms)
    refreshInterval = setInterval(() => {
      loadReservations(currentDate);
    }, 120000);
  }

  function goToday() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('dateFilter').value = today;
    currentDate = today;
    loadReservations(today);
  }

  function loadReservations(dateISO) {
    currentDate = dateISO;

    if (unsubscribe) {
      unsubscribe();
      unsubscribe = null;
    }

    const loadingArea = document.getElementById('loadingArea');
    const reservationsList = document.getElementById('reservationsList');

    loadingArea.style.display = 'block';
    reservationsList.innerHTML = '';

    const query = reservationsRef.orderBy('timestamp', 'desc');

    unsubscribe = query.onSnapshot((snapshot) => {
      loadingArea.style.display = 'none';

      const filtered = [];
      const [year, month, day] = dateISO.split('-');
      const targetDate = new Date(year, month - 1, day);
      const targetStr = targetDate.toLocaleDateString('es-PE', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      }).toUpperCase();

      snapshot.forEach((doc) => {
        const data = doc.data();
        if (data.dateISO === dateISO || data.date === targetStr) {
          filtered.push({ id: doc.id, ...data });
        }
      });

      filtered.sort((a, b) => (a.time || '').localeCompare(b.time || ''));

      // ✅ Calcular estadísticas
      let totalIncome = 0;
      let totalClients = 0;
      let totalPending = 0;
      let totalCancelled = 0;

      filtered.forEach((res) => {
        const status = res.status || 'pending';
        if (status === 'completed') {
          totalIncome += parseFloat(res.price) || 0;
          totalClients++;
        } else if (status === 'cancelled') {
          totalCancelled++;
        } else {
          totalPending++;
        }
      });

      document.getElementById('statClients').textContent = totalClients;
      document.getElementById('statIncome').textContent = 'S/ ' + totalIncome;
      document.getElementById('statPending').textContent = totalPending;
      document.getElementById('statCancelled').textContent = totalCancelled;

      if (filtered.length === 0) {
        reservationsList.innerHTML = `
          <div class="no-reservations">
            <i class="fas fa-calendar-times"></i>
            <h3>Sin reservas</h3>
            <p>No hay citas registradas para este día</p>
          </div>
        `;
        return;
      }

      reservationsList.innerHTML = '';
      filtered.forEach((res) => {
        reservationsList.appendChild(createReservationCard(res));
      });
    }, (error) => {
      loadingArea.style.display = 'none';
      console.error('Error cargando reservas:', error);
      reservationsList.innerHTML = `
        <div class="no-reservations">
          <i class="fas fa-exclamation-triangle"></i>
          <h3>Error de conexión</h3>
          <p>No se pudieron cargar las reservas. Reintentando...</p>
        </div>
      `;
    });
  }

  function createReservationCard(res) {
    const card = document.createElement('div');
    card.className = 'reservation-card';

    const status = res.status || 'pending';
    if (status === 'completed') card.classList.add('completed-card');
    if (status === 'cancelled') card.classList.add('cancelled-card');

    let reservedAt = 'N/A';
    if (res.timestamp) {
      const ts = res.timestamp.toDate ? res.timestamp.toDate() : new Date(res.timestamp);
      reservedAt = ts.toLocaleTimeString('es-PE', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
    }

    const proName = res.professional || res.professionalName || 'No especificado';

    let statusLabel = '';
    let statusClass = '';
    switch (status) {
      case 'completed':
        statusLabel = '✅ Completado';
        statusClass = 'completed';
        break;
      case 'cancelled':
        statusLabel = '❌ Cancelado';
        statusClass = 'cancelled';
        break;
      default:
        statusLabel = '⏳ Pendiente';
        statusClass = 'pending';
    }

    card.innerHTML = `
      <div class="card-header">
        <button class="card-status ${statusClass}" onclick="toggleStatus('${res.id}', '${status}')">
          ${statusLabel}
        </button>
        <div class="card-reserved-time">
          <i class="fas fa-clock"></i>
          Reservado a las <strong>${reservedAt}</strong>
        </div>
      </div>
      <div class="card-body">
        <div class="card-item">
          <div class="item-header">
            <i class="fas fa-cut"></i>
            <span class="item-label">Servicio</span>
          </div>
          <span class="item-value">${res.service || 'N/A'}</span>
        </div>
        <div class="card-item">
          <div class="item-header">
            <i class="fas fa-user-tie"></i>
            <span class="item-label">Profesional</span>
          </div>
          <span class="item-value">${proName}</span>
        </div>
        <div class="card-item">
          <div class="item-header">
            <i class="fas fa-calendar-day"></i>
            <span class="item-label">Fecha de Cita</span>
          </div>
          <span class="item-value">${res.date || 'N/A'}</span>
        </div>
        <div class="card-item">
          <div class="item-header">
            <i class="fas fa-clock"></i>
            <span class="item-label">Hora de Cita</span>
          </div>
          <span class="item-value cita-time">${res.time || 'N/A'}</span>
        </div>
        <div class="card-item">
          <div class="item-header">
            <i class="fas fa-user"></i>
            <span class="item-label">Cliente</span>
          </div>
          <span class="item-value client-name">${res.name || 'N/A'}</span>
        </div>
        <div class="card-item">
          <div class="item-header">
            <i class="fas fa-phone"></i>
            <span class="item-label">Teléfono</span>
          </div>
          <span class="item-value">${res.phone || 'N/A'}</span>
        </div>
        <div class="card-item">
          <div class="item-header">
            <i class="fas fa-coins"></i>
            <span class="item-label">Precio</span>
          </div>
          <span class="item-value price-value">S/ ${res.price || '0'}</span>
        </div>
      </div>
    `;

    return card;
  }

  // === CAMBIAR ESTADO ===
  async function toggleStatus(resId, currentStatus) {
    let newStatus;
    switch (currentStatus) {
      case 'pending':
        newStatus = 'completed';
        break;
      case 'completed':
        newStatus = 'cancelled';
        break;
      case 'cancelled':
        newStatus = 'pending';
        break;
      default:
        newStatus = 'pending';
    }

    try {
      await reservationsRef.doc(resId).update({
        status: newStatus,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
    } catch (error) {
      console.error('Error al actualizar estado:', error);
      alert('No se pudo cambiar el estado. Verifica la conexión.');
    }
  }

  // Limpiar al salir
  window.addEventListener('beforeunload', () => {
    if (unsubscribe) unsubscribe();
    if (refreshInterval) clearInterval(refreshInterval);
  });
</script>
</body>
</html>
